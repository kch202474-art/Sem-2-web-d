<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="drum-machine">
        <h1>Drum Machine</h1>
        <div id="display">Press a key</div>

        <div class="pads">
            <button class="drum-pad" id="Heater-1">Q
                <audio class="clip" id="Q" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-1.mp3"></audio>
            </button>

            <button class="drum-pad" id="Heater-2">W
                <audio class="clip" id="W" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-2.mp3"></audio>
            </button>

            <button class="drum-pad" id="Heater-3">E
                <audio class="clip" id="E" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-3.mp3"></audio>
            </button>

            <button class="drum-pad" id="Kick">A
                <audio class="clip" id="A" src="https://s3.amazonaws.com/freecodecamp/drums/RP4_KICK_1.mp3"></audio>
            </button>

            <button class="drum-pad" id="Clap">S
                <audio class="clip" id="S" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-6.mp3"></audio>
            </button>

            <button class="drum-pad" id="Open-HH">D
                <audio class="clip" id="D" src="https://s3.amazonaws.com/freecodecamp/drums/Dsc_Oh.mp3"></audio>
            </button>

            <button class="drum-pad" id="Kick-n-Hat">Z
                <audio class="clip" id="Z" src="https://s3.amazonaws.com/freecodecamp/drums/Kick_n_Hat.mp3"></audio>
            </button>

            <button class="drum-pad" id="Closed-HH">X
                <audio class="clip" id="X" src="https://s3.amazonaws.com/freecodecamp/drums/Cev_H2.mp3"></audio>
            </button>

            <button class="drum-pad" id="Chord">C
                <audio class="clip" id="C" src="https://s3.amazonaws.com/freecodecamp/drums/Chord_1.mp3"></audio>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
